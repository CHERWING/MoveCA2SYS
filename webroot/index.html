<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MoveCA2SYS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1a1a2e;--card:#16213e;--card2:#0f3460;
  --accent:#e94560;--green:#2ecc71;--orange:#f39c12;--gray:#7f8c8d;
  --text:#eee;--text2:#a0a0b0;--border:#2a2a4a
}
body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);padding:16px;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:16px}
.header h1{font-size:20px;font-weight:700}
.header h1 span{color:var(--accent)}
.header .ver{font-size:12px;color:var(--text2);margin-top:2px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-card{background:var(--card);border-radius:12px;padding:10px;text-align:center;overflow:hidden}
.stat-card .num{font-size:22px;font-weight:700}
.stat-card .label{font-size:10px;color:var(--text2);margin-top:2px}
.stat-card.total .num{color:var(--accent)}
.stat-card.moved .num{color:var(--green)}
.stat-card.pending .num{color:var(--orange)}
.info-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;font-size:12px;color:var(--text2)}
.info-row span{background:var(--card);padding:6px 12px;border-radius:8px}
.info-row .g{color:var(--green)}.info-row .r{color:var(--accent)}
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.btn:active{opacity:.8}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}
.btn-success{background:var(--green);color:#fff}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-sm{padding:6px 12px;font-size:12px}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -4px}
.cert-table{width:100%;border-collapse:collapse;font-size:13px}
.cert-table th{text-align:left;padding:8px 6px;font-size:10px;text-transform:uppercase;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap}
.cert-table td{padding:8px 6px;border-bottom:1px solid var(--border);vertical-align:middle;word-break:break-all}
.cert-table tr:hover td{background:rgba(233,69,96,.04)}
.cert-table .mono{font-family:'SF Mono','Fira Code',monospace;font-size:12px;color:var(--accent);word-break:break-all}
.cert-table .subj{font-size:11px;color:var(--text2);line-height:1.3}
.cert-table .orig{font-size:10px;color:var(--gray);margin-top:2px;display:block}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-moved{background:rgba(46,204,113,.15);color:var(--green)}
.badge-pending{background:rgba(243,156,18,.15);color:var(--orange)}
.badge-nossl{background:rgba(233,69,96,.15);color:var(--accent)}
.src-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;background:rgba(255,255,255,.08);white-space:nowrap}
.format-tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:700;font-family:monospace}
.format-0{background:rgba(46,204,113,.12);color:var(--green)}
.format-pem{background:rgba(233,69,96,.12);color:var(--accent)}
.format-unknown{background:rgba(127,140,141,.12);color:var(--gray)}
.collapsible{background:var(--card);border-radius:8px;margin-bottom:12px;overflow:hidden}
.collapsible-hdr{padding:10px 14px;font-size:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.collapsible-hdr:hover{background:rgba(255,255,255,.02)}
.collapsible-hdr .arrow{transition:transform .2s;font-size:10px}
.collapsible-hdr .arrow.open{transform:rotate(180deg)}
.collapsible-body{display:none;padding:8px 14px 12px;font-size:11px;color:var(--text2);max-height:200px;overflow-y:auto;line-height:1.6}
.collapsible-body.open{display:block}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-state .icon{font-size:40px;margin-bottom:10px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--text2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;padding:20px 0 10px;font-size:11px;color:var(--text2);border-top:1px solid var(--border);margin-top:16px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);color:var(--text);padding:10px 20px;border-radius:8px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:999;opacity:0;transition:opacity .3s;max-width:90vw;text-align:center}
.toast.show{opacity:1}
@media(prefers-color-scheme:light){
  :root{--bg:#f5f5f5;--card:#fff;--card2:#e8e8e8;--text:#222;--text2:#777;--border:#ddd}
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>MoveCA<span>2SYS</span></h1>
    <div class="ver">证书迁移管理</div>
  </div>
  <div style="display:flex;gap:6px">
    <button class="btn btn-outline btn-sm" onclick="doCheckUpdate()" id="updateBtn">⬇ 更新</button>
    <button class="btn btn-outline btn-sm" onclick="doRefresh()" id="refreshBtn">⟳ 刷新</button>
  </div>
</div>

<div class="stats">
  <div class="stat-card total"><div class="num" id="statTotal">-</div><div class="label">总计</div></div>
  <div class="stat-card moved"><div class="num" id="statMoved">-</div><div class="label">已迁移</div></div>
  <div class="stat-card pending"><div class="num" id="statPending">-</div><div class="label">待迁移</div></div>
</div>

<div id="infoRow"></div>
<div id="warnRow"></div>

<div class="toolbar">
  <button class="btn btn-success" id="moveAllBtn" onclick="doMoveAll()" disabled>迁移全部</button>
  <input id="searchInput" placeholder="搜索名称 / 原始文件名 / 来源..." style="flex:1;min-width:120px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;outline:none" oninput="renderTable()">
</div>

<div id="certContainer">
  <div class="empty-state">
    <div class="icon">📜</div>
    <p>正在扫描...</p>
    <div class="spinner"></div>
  </div>
</div>

<div id="sysUserContainer"></div>

<div class="collapsible">
  <div class="collapsible-hdr" onclick="toggleCollapse('settingsPanel')">
    <span>⚙️ 设置</span>
    <span class="arrow" id="arr-settingsPanel">▼</span>
  </div>
  <div class="collapsible-body" id="settingsPanel">
    <div style="margin-bottom:10px">
      <label style="font-size:11px;display:block;margin-bottom:4px">HTTP 代理（可选，用于检测更新）</label>
      <div style="display:flex;gap:8px">
        <input id="proxyInput" placeholder="如 127.0.0.1:10809" style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:12px;outline:none" value="127.0.0.1:10809">
        <button class="btn btn-outline btn-sm" onclick="doCheckUpdate()">检查更新</button>
      </div>
    </div>
    <div id="updateResult" style="font-size:12px;color:var(--text2);line-height:1.6"></div>
  </div>
</div>

<div class="footer">MoveCA2SYS · Made by CHERWIN</div>

<div class="toast" id="toast"></div>

<script>
var api = null;
(function(){
  var names = ['$magisk','KSU','$ksu','ksu','Magisk','magisk','$'];
  var methods = ['exec','run','shell','cmd','command'];
  for (var i = 0; i < names.length; i++) {
    var obj = window[names[i]];
    if (!obj) continue;
    for (var j = 0; j < methods.length; j++) {
      if (typeof obj[methods[j]] === 'function') {
        api = { obj: obj, method: methods[j] };
        return;
      }
    }
  }
  for (var k in window) {
    try {
      var obj = window[k];
      if (!obj || typeof obj !== 'object' || obj === window) continue;
      for (var j = 0; j < methods.length; j++) {
        if (typeof obj[methods[j]] === 'function') {
          api = { obj: obj, method: methods[j], key: k };
          return;
        }
      }
    } catch(e) {}
  }
})();

function sh(cmd) {
  return new Promise(function(resolve, reject) {
    if (!api) { reject(new Error('No Shell API')); return; }
    try {
      var ret = api.obj[api.method](cmd);
      if (ret && typeof ret.then === 'function') return void ret.then(resolve).catch(reject);
      resolve(ret);
    } catch(e) { reject(e); }
  });
}

function parse(r) {
  if (typeof r === 'string') return {stdout: r};
  if (r && r.stdout !== undefined) return r;
  if (r && r.stdio !== undefined) return {stdout: r.stdio};
  return r;
}

function $(id) { return document.getElementById(id); }
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

var MODULE_DIR = '/data/adb/modules/MoveCA2SYS';
var certList = [];
var opensslOk = false;
var toastTimer = null;

function showToast(msg) {
  var el = $('toast');
  el.textContent = msg; el.className = 'toast show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){el.className='toast';}, 3000);
}

function run(cmd) {
  return sh(cmd).then(parse).then(function(r) { return (r.stdout||r.stdio||r||'').trim(); });
}

function formatSize(s) {
  if (!s || s <= 0) return '-';
  return s > 1024 ? (s/1024).toFixed(1)+' KB' : s+' B';
}

function makeCollapsible(title, id, items) {
  var html = '<div class="collapsible">';
  html += '<div class="collapsible-hdr" onclick="toggleCollapse(\''+id+'\')">';
  html += '<span>'+title+' <span style="color:var(--text2)">('+items.length+')</span></span>';
  html += '<span class="arrow" id="arr-'+id+'">▼</span></div>';
  html += '<div class="collapsible-body" id="'+id+'">';
  for (var i = 0; i < items.length; i++) html += esc(items[i]) + '<br>';
  html += '</div></div>';
  return html;
}

function toggleCollapse(id) {
  var body = $(id); var arr = $('arr-'+id);
  if (!body) return;
  var open = body.className.indexOf('open') >= 0;
  body.className = open ? 'collapsible-body' : 'collapsible-body open';
  arr.className = open ? 'arrow' : 'arrow open';
}

function doRefresh() {
  $('refreshBtn').disabled = true;
  $('certContainer').innerHTML = '<div class="empty-state"><div class="icon">📜</div><p>扫描中...</p><div class="spinner"></div></div>';

  setTimeout(function() {
    run('sh ' + MODULE_DIR + '/common/scan.sh')
      .then(function(jsonText) {
        var data = JSON.parse(jsonText);

        if (data.debug && data.debug.moddir) MODULE_DIR = data.debug.moddir;

        opensslOk = data.debug && data.debug.openssl;
        certList = data.certs || [];
        var sys = data.sys && data.sys.list ? data.sys.list : [];
        var user = data.user && data.user.list ? data.user.list : [];

        var total = certList.length;
        var moved = certList.filter(function(c){return c.moved;}).length;
        var pending = certList.filter(function(c){return !c.moved;}).length;
        var unsup = certList.filter(function(c){return !c.converted;}).length;
        $('statTotal').textContent = total;
        $('statMoved').textContent = moved;
        $('statPending').textContent = pending + (unsup > 0 ? ' ('+unsup+' 需 openssl)' : '');
        $('moveAllBtn').disabled = pending === 0;

        var info = '<div class="info-row">';
        info += '<span>📁 ' + esc(MODULE_DIR) + '</span>';
        info += '<span>🔒 openssl: ' + (opensslOk ? '<span class="g">✓ 可用</span>' : '<span class="r">✗ 不可用</span>') + '</span>';
        if (!opensslOk) info += '<span><a href="#" onclick="doInstallSSL();return false" style="color:var(--accent)">安装 openssl</a></span>';
        info += '</div>';
        $('infoRow').innerHTML = info;

        if (unsup > 0 && !opensslOk) {
          $('warnRow').innerHTML = '<div style="background:rgba(243,156,18,.1);border:1px solid rgba(243,156,18,.3);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--orange)">' + unsup + ' 个证书需要 openssl 转换，<a href="#" onclick="doInstallSSL();return false" style="color:var(--accent)">点击安装</a></div>';
        } else if (opensslOk && unsup > 0) {
          $('warnRow').innerHTML = '<div style="background:rgba(46,204,113,.08);border:1px solid rgba(46,204,113,.2);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--green)">openssl 可用，支持 PEM/CRT 转换</div>';
        } else {
          $('warnRow').innerHTML = '';
        }

        var suHtml = makeCollapsible('系统证书', 'sysList', sys);
        suHtml += makeCollapsible('用户证书', 'userList', user);
        $('sysUserContainer').innerHTML = suHtml;

        renderTable();
      })
      .catch(function(err) {
        $('certContainer').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p style="color:var(--accent)">扫描失败</p><p style="font-size:12px;color:var(--text2);margin-top:8px">' + esc(err.message||String(err)) + '</p></div>';
      })
      .then(function() { $('refreshBtn').disabled = false; });
  }, 50);
}

function renderTable() {
  var q = ($('searchInput').value||'').toLowerCase();
  var filtered = certList;
  if (q) {
    filtered = certList.filter(function(c){
      return (c.name||'').toLowerCase().indexOf(q) >= 0 ||
             (c.subject||'').toLowerCase().indexOf(q) >= 0 ||
             (c.app||c.source||'').toLowerCase().indexOf(q) >= 0 ||
             (c.target||'').toLowerCase().indexOf(q) >= 0;
    });
  }

  var container = $('certContainer');
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>' + (q ? '没有匹配的证书' : '没有找到证书') + '</p><p style="font-size:12px;color:var(--text2);margin-top:8px">将证书放入 /storage/emulated/0/MoveCA2SYS/ 或安装抓包 App</p></div>';
    return;
  }

  var html = '<div class="table-wrap"><table class="cert-table"><thead><tr>' +
    '<th>名称</th><th>来源</th><th>格式</th><th>大小</th><th>状态</th><th>操作</th>' +
    '</tr></thead><tbody>';

  for (var i = 0; i < filtered.length; i++) {
    var c = filtered[i];
    var target = c.target || (c.hash ? c.hash + '.0' : c.name);
    var fmt = c.format || 'unknown';
    var fmtClass = (fmt === '0' || fmt === 'pem') ? 'format-'+fmt : 'format-unknown';

    var status, badgeClass;
    if (c.moved) { status = '已迁移'; badgeClass = 'badge-moved'; }
    else if (c.converted) { status = '待迁移'; badgeClass = 'badge-pending'; }
    else { status = '需 openssl'; badgeClass = 'badge-nossl'; }

    var btn = '';
    if (!c.moved && c.converted) {
      btn = '<button class="btn btn-success btn-sm" onclick="doMoveOne(\'' + esc(c.name) + '\')">移动</button>';
    } else if (!c.moved) {
      // 对于 PEM/CRT 但 openssl 不可用，显示提示
      var sslMsg = c.converted ? '' : ' (需 openssl)';
      btn = '<span style="color:var(--gray);font-size:11px">-'+sslMsg+'</span>';
    } else {
      btn = '<span style="color:var(--green);font-size:14px">✓</span>';
    }

    html += '<tr>' +
      '<td><div class="mono">' + esc(target) + '</div><div class="subj">' + esc(c.subject||'') + '</div><div class="orig">' + esc(c.name||'') + '</div></td>' +
      '<td><span class="src-badge">' + esc(c.app||c.source||'-') + '</span></td>' +
      '<td><span class="format-tag ' + fmtClass + '">' + fmt.toUpperCase() + '</span></td>' +
      '<td>' + formatSize(c.size) + '</td>' +
      '<td><span class="badge ' + badgeClass + '">' + status + '</span></td>' +
      '<td>' + btn + '</td></tr>';
  }

  html += '</tbody></table></div>';
  container.innerHTML = html;
}

function doMoveOne(name) {
  showToast('正在移动: ' + name + ' ...');
  // setTimeout 让 UI 渲染 toast 后再执行阻塞的 shell 调用
  setTimeout(function() {
    run('sh ' + MODULE_DIR + '/common/move.sh ' + name)
      .then(function(out) {
        try {
          var r = JSON.parse(out);
          if (r && r.results && r.results[0] && r.results[0].ok) showToast('✓ 迁移成功');
          else showToast('✗ 迁移失败');
        } catch(e) { showToast('完成'); }
        doRefresh();
      })
      .catch(function(err) { showToast('错误: ' + err.message); doRefresh(); });
  }, 100);
}

function doMoveAll() {
  $('moveAllBtn').disabled = true;
  showToast('正在迁移全部...');
  setTimeout(function() {
    run('sh ' + MODULE_DIR + '/common/move.sh --all')
      .then(function(out) {
        try {
          var r = JSON.parse(out);
          if (r && r.results) {
            var ok = r.results.filter(function(x){return x.ok;}).length;
            var fail = r.results.filter(function(x){return !x.ok;}).length;
            showToast('✓ 成功: ' + ok + (fail > 0 ? ' | ✗ 失败: ' + fail : ''));
          }
        } catch(e) { showToast('迁移完成'); }
        doRefresh();
      })
      .catch(function(err) { showToast('错误: ' + err.message); doRefresh(); });
  }, 100);
}

function doCheckUpdate() {
  var proxy = ($('proxyInput').value||'').trim();
  var resultEl = $('updateResult');
  $('updateBtn').disabled = true;
  resultEl.innerHTML = '<span style="color:var(--text2)">检查中...</span>';

  var cmd = 'sh ' + MODULE_DIR + '/common/check-update.sh';
  if (proxy) cmd += ' "http://' + proxy + '"';

  setTimeout(function() {
    run(cmd)
      .then(function(out) {
        try {
          var r = JSON.parse(out);
          if (!r.ok) {
            resultEl.innerHTML = '<span style="color:var(--orange)">✗ ' + esc(r.error||'检查失败') + '</span>';
            return;
          }
          var cur = r.current, lat = r.latest;
          var html = '<div>当前版本: <strong>' + esc(cur.version||'?') + '</strong> (code: ' + esc(cur.code||'?') + ')</div>';
          if (r.need_update) {
            html += '<div style="color:var(--orange);margin-top:4px">🔄 发现新版本: <strong>' + esc(lat.version||'?') + '</strong></div>';
            if (r.download) html += '<div style="margin-top:6px"><a href="' + esc(r.download) + '" target="_blank" class="btn btn-primary btn-sm" style="text-decoration:none;display:inline-block">⬇ 下载最新版</a></div>';
          } else {
            html += '<div style="color:var(--green);margin-top:4px">✓ 已是最新版本</div>';
          }
          resultEl.innerHTML = html;
        } catch(e) {
          resultEl.innerHTML = '<span style="color:var(--orange)">✗ 解析失败: ' + esc(e.message) + '</span>';
        }
      })
      .catch(function(err) {
        resultEl.innerHTML = '<span style="color:var(--accent)">✗ ' + esc(err.message||'网络错误') + '</span>';
      })
      .then(function() { $('updateBtn').disabled = false; });
  }, 100);
}

function doInstallSSL() {
  showToast('验证 openssl ...');
  run('sh ' + MODULE_DIR + '/common/tools/install-openssl.sh 2>&1')
    .then(function(out) {
      if (out.indexOf('usable') >= 0 || out.indexOf('found') >= 0) {
        opensslOk = true;
        showToast('✓ openssl 可用');
      } else {
        showToast('✗ openssl 不可用，请安装 Termux');
      }
      doRefresh();
    })
    .catch(function(err) { showToast('错误: ' + err.message); });
}

// 启动
if (!api) {
  $('certContainer').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p style="color:var(--accent)">Shell API 不可用</p></div>';
} else {
  doRefresh();
}
</script>
</body>
</html>
